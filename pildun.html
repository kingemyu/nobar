<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>PILDUN</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.9.11/shaka-player.compiled.js"></script>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  overflow: hidden;
  font-family: "Segoe UI", sans-serif;
  background: #000;
}

/* LAYOUT UTAMA */
body {
  display: flex;
  flex-direction: row;
}

/* CONTAINER */
.container {
  display: flex;
  flex-direction: row;
  width: 100%;
  height: 100%;
  padding: 0;
  gap: 0;
}

/* PLAYER */
.player {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  border-radius: 0;
  overflow: hidden;
  position: relative;
  min-height: 0;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #000;
}

/* PANEL KANAN */
.right-panel {
  width: 283px;
  display: flex;
  flex-direction: column;
  background: #fff;
  border-left: 1px solid #ddd;
  min-height: 0;
}

/* SIDEBAR */
.sidebar {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  background: #fff;
  padding: 0;
  scrollbar-width: thin;
  scrollbar-color: #bbb transparent;
}

.sidebar::-webkit-scrollbar {
  width: 5px;
}

.sidebar::-webkit-scrollbar-thumb {
  background: #bbb;
  border-radius: 10px;
}

/* CHANNEL ITEM */
.channel {
  padding: 14px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
  transition: background 0.2s;
  background: #fff;
  color: #000;
  font-size: 14px;
  white-space: normal;
  overflow: hidden;
  text-overflow: ellipsis;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

.channel:hover {
  background: #dfe9ff;
}

.channel.active {
  background: #c3d4f7;
  color: #000;
}

/* MOBILE */
@media (max-width: 768px) {
  body,
  .container {
    flex-direction: column;
  }

  .player {
    height: 40%;
    width: 100%;
  }

  .right-panel {
    width: 100%;
    height: 60%;
    border-left: none;
    border-top: 1px solid #ddd;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="player">
    <video id="video"
           autoplay
           controls
           playsinline
           preload="auto"
           x-webkit-airplay="allow">
    </video>
  </div>

  <div class="right-panel">
    <div class="sidebar">
      <div id="channelList"></div>
    </div>
  </div>

</div>

<script>
const video = document.getElementById('video');
const list = document.getElementById('channelList');
const sidebar = document.querySelector('.sidebar');

let player = null;
let channels = [];

const PLAYLIST_URL =
'https://raw.githubusercontent.com/kingemyu/nobar/main/pildun.txt';


// =========================
// INIT SHAKA
// =========================
async function initPlayer() {

  shaka.polyfill.installAll();

  if (!shaka.Player.isBrowserSupported()) {

    console.log('Browser tidak support Shaka');

    return;

  }

  player = new shaka.Player(video);

  player.configure({

    streaming: {

      bufferingGoal: 30,
      rebufferingGoal: 2

    },

    manifest: {

      dash: {

        ignoreDrmInfo: false

      }

    }

  });

  player.addEventListener('error', event => {

    console.log('SHAKA ERROR', event.detail);

  });

}


// =========================
// LOAD PLAYLIST
// =========================
async function loadChannels() {

  try {

    const response = await fetch(PLAYLIST_URL);

    const text = await response.text();

    channels = text
      .split('\n')
      .map(line => line.trim())
      .filter(line => line)
      .map(line => {

        const parts = line.split(/\s*\|\s*/);

        return {

          name: parts[0]?.trim() || '',
          url: parts[1]?.trim() || '',
          clearkey: parts[2]?.trim() || ''

        };

      })
      .filter(ch => ch.name && ch.url);

    renderChannels();

  } catch (err) {

    console.log('GAGAL LOAD PLAYLIST', err);

  }

}


// =========================
// LOAD CHANNEL
// =========================
async function loadChannel(channel, element) {

  document
    .querySelectorAll('.channel')
    .forEach(el => el.classList.remove('active'));

  element.classList.add('active');

  video.style.opacity = '0.7';

  try {

    await player.unload();

    player.configure({

      drm: {

        clearKeys: {}

      }

    });

    if (channel.clearkey) {

      const drmParts = channel.clearkey.split(':');

      if (drmParts.length === 2) {

        const kid = drmParts[0]
          .trim()
          .toLowerCase();

        const key = drmParts[1]
          .trim()
          .toLowerCase();

        player.configure({

          drm: {

            clearKeys: {

              [kid]: key

            }

          }

        });

      }

    }

    await player.load(channel.url);

    video.style.opacity = '1';

    await video.play();

  } catch (err) {

    console.log('LOAD ERROR', err);

    video.style.opacity = '1';

  }

}


// =========================
// RENDER CHANNELS
// =========================
function renderChannels() {

  list.innerHTML = '';

  channels.forEach((ch, index) => {

    const div = document.createElement('div');

    div.className = 'channel';

    div.innerHTML = `<div>${ch.name}</div>`;

    div.onclick = () => {

      loadChannel(
        ch,
        div
      );

    };

    list.appendChild(div);

    if (index === 0) {

      setTimeout(() => {

        div.click();

      }, 300);

    }

  });

  setTimeout(() => {

    sidebar.scrollTop = 0;

  }, 100);

}


// =========================
// VIDEO EVENTS
// =========================
video.addEventListener('loadeddata', () => {

  video.style.opacity = '1';

});

video.addEventListener('error', event => {

  console.log('VIDEO ERROR', event);

  video.style.opacity = '1';

});


// =========================
// START
// =========================
(async () => {

  await initPlayer();

  await loadChannels();

})();
</script>

</body>
</html>
